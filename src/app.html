<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Email Unsubscriber — Clean Your Inbox for Good</title>
    <meta name="description" content="Unsubscribe from unwanted emails in one click. No subscription. Pay once. Privacy-first." />
    <script>
      (function() {
        var m = document.cookie.match('(?:^|; )theme=([^;]*)');
        var theme = m ? m[1] : localStorage.getItem('theme.preference');
        if (theme === 'dark') document.documentElement.classList.add('dark');
        else if (theme === 'light') document.documentElement.classList.add('light');
        else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
    <footer id="static-fallback" style="position:fixed;bottom:0;left:0;right:0;padding:12px 16px;text-align:center;font-size:12px;font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;color:#94a3b8;">
      <a href="https://email-unsubscriber.com/privacy" style="color:#94a3b8;text-decoration:underline;">Privacy Policy</a>
      <span style="margin:0 8px;">|</span>
      <a href="https://email-unsubscriber.com/terms" style="color:#94a3b8;text-decoration:underline;">Terms of Service</a>
    </footer>
    <script>document.getElementById('static-fallback')?.remove();</script>
  </body>
</html>
