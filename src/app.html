<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Email Unsubscriber — Clean Your Inbox for Good</title>
    <meta name="description" content="Unsubscribe from unwanted emails in one click. No subscription. Pay once. Privacy-first." />
    <script>
      (function() {
        var m = document.cookie.match('(?:^|; )theme=([^;]*)');
        var theme = m ? m[1] : localStorage.getItem('theme.preference');
        if (theme === 'dark') document.documentElement.classList.add('dark');
        else if (theme === 'light') document.documentElement.classList.add('light');
        else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
